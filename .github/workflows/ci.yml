name: "CI - MLflow Training & Docker Build"

on:
  push:
    branches:
      - main
    paths:
      - "Membangun_model/**"
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah estimator Random Forest"
        required: false
        default: "200"
      max_depth:
        description: "Kedalaman maksimum pohon (0 = None)"
        required: false
        default: "20"

# Izin untuk push artefak kembali ke repo
permissions:
  contents: write

jobs:
  train:
    name: "Train Model (MLflow Project)"
    runs-on: ubuntu-latest

    outputs:
      run_id: ${{ steps.get_run_id.outputs.run_id }}

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: "pip"

      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas==2.2.3 \
            numpy==1.26.4 \
            scikit-learn==1.5.2 \
            mlflow==2.19.0 \
            dagshub==0.3.45 \
            matplotlib==3.9.2 \
            seaborn==0.13.2

      - name: "Verify Dataset Exists"
        run: |
          echo "Memeriksa dataset preprocessing..."
          required_files=(
            "Membangun_model/weatherAUS_preprocessing/X_train.csv"
            "Membangun_model/weatherAUS_preprocessing/X_test.csv"
            "Membangun_model/weatherAUS_preprocessing/y_train.csv"
            "Membangun_model/weatherAUS_preprocessing/y_test.csv"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "File tidak ditemukan: $f"
              exit 1
            fi
            echo "$(basename $f): $(wc -l < $f) baris"
          done

      - name: "Run MLflow Project"
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO:     ${{ secrets.DAGSHUB_REPO }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA:        ${{ github.sha }}
        run: |
          N_EST=${{ github.event.inputs.n_estimators || '200' }}
          MAX_D=${{ github.event.inputs.max_depth    || '20' }}

          echo "Menjalankan MLflow Project..."
          echo "n_estimators = $N_EST"
          echo "max_depth    = $MAX_D"

          mlflow run Membangun_model/ \
            --env-manager=local \
            --experiment-name "RainAUS-CI-Training" \
            -P n_estimators=$N_EST \
            -P max_depth=$MAX_D \
            -P min_samples_split=5 \
            -P min_samples_leaf=2 \
            -P max_features=sqrt \
            -P test_size=0.2 \
            -P random_state=42

      - name: "Get MLflow Run ID"
        id: get_run_id
        run: |
          if [ -f "run_id.txt" ]; then
            RUN_ID=$(cat run_id.txt)
          else
            RUN_ID=$(python - <<'EOF'
          import mlflow, json, os
          client = mlflow.tracking.MlflowClient(tracking_uri="mlruns")
          exps   = client.search_experiments(filter_string="name='RainAUS-CI-Training'")
          if exps:
              runs = client.search_runs(
                  experiment_ids=[exps[0].experiment_id],
                  order_by=["start_time DESC"],
                  max_results=1
              )
              print(runs[0].info.run_id if runs else "")
          EOF
          )
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      - name: "Print Metrics"
        run: |
          RUN_ID=${{ steps.get_run_id.outputs.run_id }}
          python - <<EOF
          import mlflow
          client = mlflow.tracking.MlflowClient(tracking_uri="mlruns")
          run    = client.get_run("$RUN_ID")
          print("\nMetrics dari Run $RUN_ID:")
          for k, v in sorted(run.data.metrics.items()):
              print(f"   {k:<30} : {v:.4f}")
          EOF

      - name: "Upload MLflow Artifacts to GitHub"
        uses: actions/upload-artifact@v4
        with:
          name: "mlflow-artifacts-${{ github.run_number }}"
          path: |
            mlruns/
            run_id.txt
          retention-days: 30

      - name: "Commit Artifacts to Repository"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          # Tambahkan mlruns dan run_id ke tracking
          git add mlruns/ run_id.txt || true

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan artefak."
          else
            git commit -m "ci: save mlflow artifacts from run #${{ github.run_number }} [skip ci]

          Run ID : ${{ steps.get_run_id.outputs.run_id }}
          Trigger: ${{ github.event_name }}
          SHA    : ${{ github.sha }}"
            git push
            echo "Artefak berhasil di-push ke repository."
          fi

  build-docker:
    name: "Build & Push Docker Image (mlflow build-docker)"
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "Pull Latest Changes (mlruns)"
        run: git pull origin main

      - name: "Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: "Install MLflow"
        run: pip install mlflow==2.19.0

      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build Docker Image (mlflow build-docker)"
        env:
          RUN_ID: ${{ needs.train.outputs.run_id }}
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/rain-aus-model"
          IMAGE_TAG="${IMAGE_NAME}:latest"
          IMAGE_SHA="${IMAGE_NAME}:${{ github.sha }}"

          echo "Building Docker image..."
          echo "Model URI : runs:/${RUN_ID}/model"
          echo "Image     : ${IMAGE_TAG}"

          mlflow models build-docker \
            --model-uri "runs:/${RUN_ID}/model" \
            --name "${IMAGE_NAME}" \
            --env-manager=local

          # Tag tambahan dengan commit SHA
          docker tag "${IMAGE_TAG}" "${IMAGE_SHA}"

          echo "Docker image berhasil dibuat."
          docker images | grep "rain-aus-model"

      - name: "Push Image to Docker Hub"
        env:
          RUN_ID: ${{ needs.train.outputs.run_id }}
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/rain-aus-model"

          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.sha }}"

          echo "Docker image berhasil di-push ke Docker Hub!"
          echo "Pull: docker pull ${IMAGE_NAME}:latest"

      - name: "Update Docker Hub Link"
        run: |
          cat > Membangun_model/docker_hub_link.txt << EOF
          Tautan Docker Hub Image:
          https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/rain-aus-model

          Pull command:
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/rain-aus-model:latest

          Run command (serving model):
          docker run -p 5000:8080 ${{ secrets.DOCKERHUB_USERNAME }}/rain-aus-model:latest

          Build info:
            Run ID   : ${{ needs.train.outputs.run_id }}
            Trigger  : ${{ github.event_name }}
            Commit   : ${{ github.sha }}
            Run #    : ${{ github.run_number }}
          EOF

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add Membangun_model/docker_hub_link.txt
          git diff --staged --quiet || \
            git commit -m "ci: update docker hub link [skip ci]" && \
            git push || true
