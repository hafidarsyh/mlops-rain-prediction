global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    project:     "rain-aus-mlops"
    author:      "Hafid"
    environment: "local"

scrape_configs:

  - job_name: "prometheus"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "rain_aus_ml_exporter"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["ml_inference:8001"]
        labels:
          service: "ml-inference"
          model:   "RandomForestClassifier"

  - job_name: "rain_aus_inference_api"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["ml_inference:5000"]
        labels:
          service: "fastapi"

  - job_name: "node_exporter"
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          service: "node"
